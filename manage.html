<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Your Gig – Zippa</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0d0d0d; --paper: #f5f2eb; --cream: #ede9df;
    --accent: #e8452a; --green: #22c55e; --muted: #6b6560;
    --white: #ffffff; --border: rgba(13,13,13,0.12);
    --radius: 14px; --radius-lg: 22px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }
  nav { display: flex; align-items: center; justify-content: space-between; padding: 0 5%; height: 64px; background: var(--paper); border-bottom: 1px solid var(--border); }
  .logo-main { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; color: var(--ink); letter-spacing: -0.5px; text-decoration: none; }
  .logo-main span { color: var(--accent); }
  .logo-sub { font-size: 0.62rem; color: var(--muted); }

  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 5%; }
  .manage-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 40px; max-width: 560px; width: 100%; }

  .state-loading, .state-error, .state-closed { text-align: center; padding: 2rem 0; }
  .state-icon { font-size: 2.5rem; margin-bottom: 1rem; }
  .state-loading p, .state-error p, .state-closed p { color: var(--muted); font-size: 0.9rem; margin-top: 0.5rem; }

  h1 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.5rem; letter-spacing: -0.5px; margin-bottom: 0.3rem; }
  .gig-summary { background: var(--cream); border-radius: 12px; padding: 16px 20px; margin: 1.5rem 0; }
  .gig-summary .label { font-size: 0.75rem; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .gig-summary .value { font-weight: 600; font-size: 0.95rem; margin-bottom: 12px; }
  .gig-summary .value:last-child { margin-bottom: 0; }
  .gig-summary .meta-row { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-top: 8px; }
  .gig-summary .meta-item { font-size: 0.82rem; color: var(--muted); }

  .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 50px; font-size: 0.78rem; font-weight: 600; margin-bottom: 1.5rem; }
  .status-active { background: #dcfce7; color: #15803d; }
  .status-expired { background: #fef9c3; color: #854d0e; }
  .status-closed { background: var(--cream); color: var(--muted); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

  .section-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; margin-bottom: 1rem; margin-top: 1.5rem; }

  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .form-group label { font-size: 0.78rem; color: var(--muted); font-weight: 500; }
  .form-group input, .form-group select, .form-group textarea { background: var(--paper); border: 1.5px solid var(--border); border-radius: 10px; color: var(--ink); padding: 11px 14px; font-size: 0.875rem; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; width: 100%; }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn { width: 100%; border: none; border-radius: 50px; padding: 13px; font-size: 0.95rem; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s, transform 0.1s; margin-top: 8px; }
  .btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-save { background: var(--ink); color: var(--white); }
  .btn-close-gig { background: var(--cream); color: var(--muted); margin-top: 12px; }
  .btn-close-gig:hover { background: #fee2e2; color: var(--accent); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

  .danger-zone { border: 1px solid #fecaca; border-radius: var(--radius); padding: 18px 20px; margin-top: 1.5rem; }
  .danger-zone h4 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; color: var(--accent); margin-bottom: 6px; }
  .danger-zone p { font-size: 0.82rem; color: var(--muted); margin-bottom: 14px; }
  .btn-danger { background: var(--accent); color: white; width: 100%; border: none; border-radius: 50px; padding: 11px; font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s; }
  .btn-danger:hover { opacity: 0.85; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--green); color: white; border-radius: 12px; padding: 14px 22px; font-weight: 500; font-size: 0.9rem; z-index: 9999; transform: translateY(80px); opacity: 0; transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .toast.show { transform: translateY(0); opacity: 1; }

  footer { text-align: center; padding: 2rem 5%; font-size: 0.78rem; color: var(--muted); border-top: 1px solid var(--border); }
  footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } .manage-card { padding: 24px; } }
</style>
</head>
<body>

<nav>
  <div>
    <a class="logo-main" href="/">Zipp<span>a</span></a>
    <div class="logo-sub">by zenplaygaming.co.ke</div>
  </div>
  <a href="/" style="font-size:0.85rem;color:var(--muted);text-decoration:none;">← Back to gigs</a>
</nav>

<main>
  <div class="manage-card" id="manageCard">
    <div class="state-loading">
      <div class="state-icon">⏳</div>
      <p>Loading your gig...</p>
    </div>
  </div>
</main>

<footer>
  <a href="/">← Back to Zippa</a> · zenplaygaming.co.ke
</footer>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://jazwgivqjkfmgididgmc.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_zFl2Eb5Anj68lwBd6SkR-A__P7VbMhd';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const ICONS = { Errands:'🛵', Cleaning:'🧹', Delivery:'📦', Handyman:'🔨', Childcare:'👶', Digital:'💻', Events:'🎉', Moving:'🚚', Other:'📋' };

let gig = null;
const token = new URLSearchParams(window.location.search).get('token');

async function init() {
  if (!token) { showError('No management token found in this link.'); return; }

  const { data, error } = await supabase
    .from('gigs').select('*').eq('edit_token', token).single();

  if (error || !data) { showError('This link is invalid or has expired.'); return; }
  gig = data;
  renderManageUI();
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-KE', { day: 'numeric', month: 'long', year: 'numeric' });
}

function getStatus() {
  if (gig.status === 'closed') return 'closed';
  if (new Date(gig.expires_at) < new Date()) return 'expired';
  return 'active';
}

function renderManageUI() {
  const status = getStatus();
  const statusLabels = { active: 'Active & visible', expired: 'Expired', closed: 'Closed by you' };
  const statusClasses = { active: 'status-active', expired: 'status-expired', closed: 'status-closed' };
  const canEdit = status === 'active';

  document.getElementById('manageCard').innerHTML = `
    <h1>Manage Your Gig</h1>
    <p style="color:var(--muted);font-size:0.85rem;margin-top:4px;">Posted ${formatDate(gig.created_at)} · Expires ${formatDate(gig.expires_at)}</p>

    <div style="margin-top:1rem;">
      <span class="status-badge ${statusClasses[status]}">
        <span class="status-dot"></span> ${statusLabels[status]}
      </span>
    </div>

    <div class="gig-summary">
      <div class="label">Current gig</div>
      <div class="value" style="font-size:1.05rem;">${ICONS[gig.category] || '📋'} ${gig.title}</div>
      <div class="meta-row">
        <span class="meta-item">📍 ${gig.location}</span>
        <span class="meta-item">💰 ${gig.salary}</span>
        <span class="meta-item">📁 ${gig.category}</span>
        <span class="meta-item">🕐 ${gig.type}</span>
      </div>
    </div>

    ${canEdit ? `
    <div class="section-title">Edit your gig</div>
    <div class="form-row">
      <div class="form-group"><label>Task Title</label><input id="eTitle" value="${gig.title}"></div>
      <div class="form-group"><label>Your Name / Business</label><input id="eCompany" value="${gig.company || ''}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Location</label><input id="eLocation" value="${gig.location}"></div>
      <div class="form-group"><label>Pay / Budget</label><input id="eSalary" value="${gig.salary}"></div>
    </div>
    <div class="form-group"><label>Description</label><textarea id="eDesc">${gig.description || ''}</textarea></div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <select id="eCategory">
          ${['Errands','Cleaning','Delivery','Handyman','Childcare','Digital','Events','Moving','Other'].map(c => `<option${c===gig.category?' selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Gig Type</label>
        <select id="eType">
          ${['One-off','Errand','Contract','Recurring'].map(t => `<option${t===gig.type?' selected':''}>${t}</option>`).join('')}
        </select>
      </div>
    </div>
    <button class="btn btn-save" id="saveBtn" onclick="saveGig()">Save Changes</button>

    <hr class="divider">

    <div class="danger-zone">
      <h4>Close this gig</h4>
      <p>Found someone for the task? Close the gig so it no longer appears in listings. This cannot be undone.</p>
      <button class="btn-danger" onclick="closeGig()">Mark as Filled & Close</button>
    </div>
    ` : `
    <div style="text-align:center;padding:1.5rem 0;color:var(--muted);">
      <p style="font-size:0.9rem;">This gig is ${status === 'expired' ? 'expired and no longer visible' : 'closed'}.</p>
      <a href="/#post" style="color:var(--accent);text-decoration:none;font-weight:600;font-size:0.9rem;display:inline-block;margin-top:1rem;">Post a new gig →</a>
    </div>
    `}
  `;
}

async function saveGig() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving...';

  const updates = {
    title: document.getElementById('eTitle').value.trim(),
    company: document.getElementById('eCompany').value.trim(),
    location: document.getElementById('eLocation').value.trim(),
    salary: document.getElementById('eSalary').value.trim(),
    description: document.getElementById('eDesc').value.trim(),
    category: document.getElementById('eCategory').value,
    type: document.getElementById('eType').value,
  };

  if (!updates.title || !updates.location || !updates.salary) {
    showToast('Please fill in all required fields.', '#e8452a');
    btn.disabled = false; btn.textContent = 'Save Changes';
    return;
  }

  const { error } = await supabase.from('gigs').update(updates).eq('edit_token', token);

  btn.disabled = false; btn.textContent = 'Save Changes';

  if (error) { showToast('Could not save. Please try again.', '#e8452a'); return; }

  Object.assign(gig, updates);
  showToast('Gig updated successfully!');
  renderManageUI();
}

async function closeGig() {
  if (!confirm('Are you sure you want to close this gig? It will be removed from listings.')) return;

  const { error } = await supabase.from('gigs').update({ status: 'closed' }).eq('edit_token', token);
  if (error) { showToast('Could not close gig. Please try again.', '#e8452a'); return; }

  gig.status = 'closed';
  showToast('Gig closed. It is no longer visible to workers.');
  setTimeout(renderManageUI, 1000);
}

function showError(msg) {
  document.getElementById('manageCard').innerHTML = `
    <div class="state-error">
      <div class="state-icon">❌</div>
      <h1 style="font-family:'Syne',sans-serif;font-weight:700;font-size:1.3rem;margin-bottom:0.5rem;">Link not found</h1>
      <p>${msg}</p>
      <a href="/" style="display:inline-block;margin-top:1.5rem;color:var(--accent);font-weight:600;text-decoration:none;">← Back to Zippa</a>
    </div>`;
}

function showToast(msg, bg = '#22c55e') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = bg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

init();
</script>
</body>
</html>
